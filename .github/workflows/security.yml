name: security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read  # gitleaks-action calls GET /repos/:owner/:repo/pulls/:n/commits on PR events
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: trivy (vuln + misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scanners: vuln,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          cache: true

  shellcheck:
    name: shellcheck (shell scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning

  semgrep:
    name: semgrep (shell security policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
          cache-dependency-path: .github/workflows/requirements-semgrep.txt
      - run: pip install -r .github/workflows/requirements-semgrep.txt
      # r/bash: curl-pipe-bash (curl|sh) / curl-eval / ifs-tampering 等の bash security
      # p/secrets: hardcoded credential pattern (gitleaks の取りこぼし補完)
      # 注: semgrep registry に p/shell pack は存在しないため r/bash を使用。
      # eval "$1" 単体 / chmod 777 のルールは現状なし（必要なら custom rule で追加）
      # WARNING 以上で fail。INFO はノイズ抑制で抜く
      - run: |
          semgrep scan \
            --config r/bash \
            --config p/secrets \
            --error \
            --severity=WARNING \
            --severity=ERROR \
            --metrics=off
