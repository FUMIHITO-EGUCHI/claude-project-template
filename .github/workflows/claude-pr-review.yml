name: Claude PR review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 5-axis review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          # Dependabot 起点 PR を許可（claude-code-action は default で bot を拒否）。
          # `*` ではなく dependabot 限定。任意 bot からの prompt injection 経路を作らない。
          allowed_bots: 'dependabot[bot]'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            BASE: ${{ github.event.pull_request.base.ref }}
            HEAD: ${{ github.event.pull_request.head.ref }}

            この PR を 5 軸でレビューする：correctness / readability / architecture / security / performance。CLAUDE.md / .claude/rules/ のルールを参照。

            ## 手順

            1. `git diff origin/${{ github.event.pull_request.base.ref }}...HEAD --stat` で変更概要
            2. 重要な diff を読み、観点ごとに inline comment を付ける
            3. 軽微な指摘はまとめて1つの summary コメントにする
            4. commit message が `#<issue>` を含むか / `[skip-issue]` 妥当か確認
            5. CLAUDE.md の "完了報告前は typecheck / build" が PR 説明で言及されているか確認

            **やってはいけないこと**:
            - PR を merge / close しない
            - approve しない（人間レビュアー領域）
            - inline comment を多発させない（重要箇所のみ）

            ## 必須出力: Learning notes for the human

            レビュー出力末尾に以下のセクションを必ず追加する（ADR-0003 学習ループ）：

            ```
            ## Learning notes for the human

            ### この PR で出てきた概念（最大3つ）
            - <概念1>: <1〜2行の説明> — <公式ドキュメントの該当ページ URL>
            - <概念2>: <1〜2行の説明> — <公式ドキュメントの該当ページ URL>
            - <概念3>: <1〜2行の説明> — <公式ドキュメントの該当ページ URL>

            ### 1分で試せる小実験
            - <手を動かして概念を確認できるコマンド or 操作を1つ>
            ```

            **重要な制約**:
            - 「言語の文法は分かるが、ライブラリと PJ 固有のパターンは初見」レベルを想定
            - 公式ドキュメントへのリンクが提供できない概念は出さない（hallucination 抑制）
            - 概念が見当たらないなら「今回は新規概念なし」と1行書いて終わる。無理に3つ捻り出さない

            ## 注意

            verdict marker（`<!-- ai-review-verdict: ... -->`）は出さない。後段の classifier step が本文を読んで自動付与する。
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*)"

      - name: Verdict classifier
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'dependabot[bot]'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            前段の 5 軸レビューが post した最新コメント（claude bot 著者）を読み、verdict marker を別コメントとして post する。rework-tracker.yml がこの marker を grep して rework count を自動付与するため、本ステップは PR 毎に必ず動く。

            ## 手順

            1. `gh pr view ${{ github.event.pull_request.number }} --comments` で最新の claude レビューコメントを取得
            2. 本文を読み「指摘を反映しないと merge すべきでないか」を yes/no で判断:
               - 修正不要・全軸 ✅ → `approved`
               - 軽微（cosmetic / 文言 / 命名 等で merge を妨げない） → `changes-requested-minor`
               - correctness / security / architecture / performance の実質指摘あり → `changes-requested-major`
            3. **`gh pr comment ${{ github.event.pull_request.number }} --body "..."`** で以下の本文を post（`<判定値>` のみ置換）:

            ```
            <!-- ai-review-verdict: <判定値> -->

            _classified by review-classifier step_
            ```

            ## 制約

            - 出力は marker コメントの post **のみ**。それ以外の操作禁止
            - 5 軸レビュー本文の再評価は不要。書かれている内容の重みから marker 値を選ぶだけ
            - 確信が持てない場合は安全側の `changes-requested-major`
          claude_args: |
            --allowedTools "Bash(gh pr:*)"
